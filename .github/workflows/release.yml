name: Release Build

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true
          gradle-home-cache-cleanup: true
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > androidApp/keystore.release
      - name: Create keystore properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf 'keyAlias=%s\nkeyAliasPassword=%s\n' "$KEY_ALIAS" "$KEY_PASSWORD" > androidApp/keystore.properties
      - name: Build release APKs
        run: ./gradlew :androidApp:assembleRelease :wearApp:assembleRelease
      - name: Upload release APKs
        uses: actions/upload-artifact@v7
        with:
          name: release-apks
          path: |
            androidApp/build/outputs/apk/release/*.apk
            wearApp/build/outputs/apk/release/*.apk
      - name: Cleanup signing files
        if: always()
        run: rm -f androidApp/keystore.release androidApp/keystore.properties
